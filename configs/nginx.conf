# nginx.conf — CBOM scanner test configuration
# Intentionally includes both strong and weak TLS settings for scanner coverage.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # -------------------------------------------------------------------------
    # Redirect HTTP → HTTPS
    # -------------------------------------------------------------------------
    server {
        listen      80;
        server_name test.example.com www.test.example.com;

        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS server block
    # -------------------------------------------------------------------------
    server {
        listen      443 ssl http2;
        server_name test.example.com www.test.example.com;

        # Certificate and private key
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/keys/private.key;

        # CA bundle for client certificate verification (optional)
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      off;

        # Protocol versions — TLSv1.2 and TLSv1.3 enabled
        ssl_protocols TLSv1.2 TLSv1.3;

        # Cipher suites — includes intentionally weak RC4 entry for CBOM weak-cipher detection
        # OpenSSL-format names (used by nginx):
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
                    'ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:'
                    'RC4:!aNULL:!MD5';

        # TLS 1.3 cipher suites (IANA names — explicit for CBOM cipher_suite detection)
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

        # Signature algorithms as OID dotted-decimal values — CBOM scanners parse these as oid field values
        # OIDs: ecdsa-with-SHA384, ecdsa-with-SHA256, sha512WithRSAEncryption, sha384WithRSAEncryption, sha256WithRSAEncryption
        ssl_conf_command SignatureAlgorithms 1.2.840.10045.4.3.3:1.2.840.10045.4.3.2:1.2.840.113549.1.1.13:1.2.840.113549.1.1.12:1.2.840.113549.1.1.11;

        # Named curves by OID for CBOM oid field detection
        # OIDs: secp384r1, prime256v1 (P-256), secp521r1, X25519
        ssl_conf_command Groups 1.3.132.0.34:1.2.840.10045.3.1.7:1.3.132.0.35:1.3.101.110;

        ssl_prefer_server_ciphers on;

        # Session settings
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/certs/ca.crt;

        # Diffie-Hellman parameters (2048-bit)
        ssl_dhparam /etc/nginx/certs/dhparam.pem;

        # ECDH curve
        ssl_ecdh_curve secp384r1;

        # HSTS — 1 year, includeSubDomains, preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Other security headers
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY    always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # TLS protocol OID — 1.3.6.1.5.5.7.1.24 (id-pe-TLSFeature, RFC 7633)
        # Exposed as a response header so scanners detect it as an actual directive value
        add_header X-TLS-Protocol-OID        "1.3.6.1.5.5.7.1.24" always;

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy upstream with mutual TLS
        location /api/ {
            proxy_pass https://backend:8443;
            proxy_ssl_certificate     /etc/nginx/certs/server.crt;
            proxy_ssl_certificate_key /etc/nginx/keys/private.key;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
            proxy_ssl_verify       on;
            proxy_ssl_session_reuse on;
            proxy_ssl_protocols    TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers      ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        }
    }
}
